version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agripredict-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: agripredict
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agripredict-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/agripredict
      - SECRET_KEY=PROD_SECRET_KEY_AGRI_PREDICT_PRO_2026_HEAI
      - MODEL_DIR=/app/ml/models
      - DATA_DIR=/app/ml/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ml-models:/app/ml/models
      - ml-data:/app/ml/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agripredict-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api

volumes:
  pgdata:
  ml-models:
  ml-data:
